spring:
  profiles:
    active: dev

  application:
    name: gymfactory

  jackson:
    mapper:
      sort-properties-alphabetically: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

resend:
  api-key: ${RESEND_API_KEY}
  from: onboarding@resend.dev

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
